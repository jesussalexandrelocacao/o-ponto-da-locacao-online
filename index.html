        pdf += `${String(offset).padStart(10, "0")} 00000 n \n`;
      });
      pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
      return new Blob([pdf], { type: "application/pdf" });
    }

    function buildStatementPdf(statement, snapshot) {
      const pageWidth = 595.28;
      const pageHeight = 841.89;
      const margin = 36;
      const contentWidth = pageWidth - margin * 2;
      const rows = statement.rows || [];
      const total = rows.reduce((sum, row) => sum + rowBalance(row), 0);
      const pages = [];
      let ops = [];
      let y = pageHeight - margin;

      const ink = [0.07, 0.18, 0.27];
      const muted = [0.36, 0.36, 0.30];
      const line = [0.78, 0.72, 0.58];
      const soft = [1.00, 0.97, 0.90];
      const headerFill = [0.07, 0.18, 0.27];
      const accentFill = [0.91, 0.35, 0.11];

      function startPage(continuation = false) {
        ops = [];
        y = pageHeight - margin;
        if (continuation) {
          drawText(state.settings.company, margin, y, 10, "F2", ink);
          drawRightText(`Continuação - ${statement.month}/${statement.referenceYear || CURRENT_YEAR}`, pageWidth - margin, y, 9, "F1", muted);
          y -= 18;
        }
      }

      function finishPage() {
        pages.push(ops.join("\n"));
      }

      function ensureSpace(needed, redrawTable = false) {
        if (y - needed >= margin) return;
        finishPage();
        startPage(true);
        if (redrawTable) drawTableHeader();
      }

      function rgb(values, mode = "rg") {
        return `${values.map((value) => value.toFixed(3)).join(" ")} ${mode}`;
      }

      function rect(x, top, w, h, fill = null, stroke = line) {
        if (fill) ops.push(`${rgb(fill)} ${x} ${top - h} ${w} ${h} re f`);
        if (stroke) ops.push(`${rgb(stroke, "RG")} ${x} ${top - h} ${w} ${h} re S`);
      }

      function textWidth(text, size) {
        return normalizePdfText(text).length * size * 0.48;
      }

      function drawText(text, x, baseline, size = 9, font = "F1", color = ink) {
        ops.push(`BT /${font} ${size} Tf ${rgb(color)} ${x.toFixed(2)} ${baseline.toFixed(2)} Td (${escapePdf(normalizePdfText(text))}) Tj ET`);
      }

      function drawRightText(text, right, baseline, size = 9, font = "F1", color = ink) {
        drawText(text, right - textWidth(text, size), baseline, size, font, color);
      }

      function drawCenterText(text, center, baseline, size = 9, font = "F1", color = ink) {
        drawText(text, center - textWidth(text, size) / 2, baseline, size, font, color);
      }

      function wrapForWidth(text, width, size = 8.5) {
        const maxChars = Math.max(8, Math.floor(width / (size * 0.48)));
        return wrapText(normalizePdfText(text || "-"), maxChars);
      }

      function drawWrapped(text, x, top, width, size = 8.5, leading = 10, font = "F1", color = ink, maxLines = 2) {
        const lines = wrapForWidth(text, width, size).slice(0, maxLines);
        lines.forEach((line, index) => drawText(line, x, top - index * leading, size, font, color));
      }

      function moneyPdf(value) {
        return money(value).replace(/\s/g, " ");
      }

      function drawInfoBox(label, value, x, top, w, h) {
        rect(x, top, w, h, soft, line);
        drawText(label.toUpperCase(), x + 5, top - 10, 6.6, "F2", muted);
        drawWrapped(value || "-", x + 5, top - 22, w - 10, 8.4, 9.5, "F1", ink, 2);
      }

      function drawMainHeader() {
        drawText(state.settings.company || "O Ponto da Locação", margin, y, 15, "F2", ink);
        drawText(state.settings.slogan || "", margin, y - 14, 9, "F1", muted);
        rect(margin, y - 24, 126, 4, accentFill, accentFill);
        const boxW = 214;
        rect(pageWidth - margin - boxW, y + 8, boxW, 58, soft, line);
        drawText("DADOS DE DEPÓSITO", pageWidth - margin - boxW + 8, y - 3, 7.4, "F2", muted);
        drawText(`Banco: ${state.settings.bank || ""}`, pageWidth - margin - boxW + 8, y - 16, 8.4, "F1", ink);
        drawText(`Agência: ${state.settings.agency || ""}`, pageWidth - margin - boxW + 8, y - 28, 8.4, "F1", ink);
        drawText(`Conta: ${state.settings.account || ""}`, pageWidth - margin - boxW + 8, y - 40, 8.4, "F1", ink);
        drawText(`Pix: ${state.settings.pix || ""}`, pageWidth - margin - boxW + 8, y - 52, 8.4, "F1", ink);
        y -= 72;

        rect(margin, y + 16, contentWidth, 26, headerFill, headerFill);
        drawCenterText(`DEMONSTRATIVO DE COBRANÇA - ${statement.referenceYear || CURRENT_YEAR}`, pageWidth / 2, y - 1, 12.5, "F2", [1, 1, 1]);
        y -= 24;

        const boxGap = 7;
        const boxW2 = (contentWidth - boxGap * 2) / 3;
        drawInfoBox("Mês de referência", statement.month, margin, y + 34, boxW2, 34);
        drawInfoBox("Vencimento", formatDate(statement.dueDate), margin + boxW2 + boxGap, y + 34, boxW2, 34);
        drawInfoBox("ID / Locatário", statement.tenantId, margin + (boxW2 + boxGap) * 2, y + 34, boxW2, 34);
        y -= 42;
      }

      function drawSnapshotGrid() {
        const info = [
          ["Nome", snapshot.nome],
          ["Celular", snapshot.telefone],
          ["E-mail", snapshot.email],
          ["Aluguel", moneyPdf(toNumber(snapshot.valorAluguel))],
          ["Plano", snapshot.plano],
          ["Vigência contrato", formatDate(snapshot.vigenciaContrato)],
          ["Reajuste", snapshot.dataReajuste],
          ["Renovação seguro", formatDate(snapshot.renovacaoSeguro)],
          ["Valor seguro", moneyPdf(toNumber(snapshot.valorSeguro))],
          ["Status seguro", snapshot.situacaoSeguro],
          ["Empreendimento", snapshot.empreendimento],
          ["Endereço", snapshot.endereco],
          ["Bairro", snapshot.bairro],
          ["Cidade / UF", `${snapshot.cidade || ""}/${snapshot.uf || ""}`],
          [`IPTU ${CURRENT_YEAR}`, `${formatLooseMoney(snapshot.iptuValor)} ${snapshot.iptuStatus || ""}`],
          ["Taxa incêndio", `${moneyPdf(toNumber(snapshot.taxaCbmerj))} ${snapshot.cbmerjStatus || ""}`],
          ["Apólice", snapshot.apoliceSeguro],
          ["Central Seguro 24h", state.settings.centralSeguro24h || snapshot.telefoneSeguradora]
        ];
        const cols = 3;
        const gap = 6;
        const w = (contentWidth - gap * (cols - 1)) / cols;
        const h = 36;
        for (let i = 0; i < info.length; i += cols) {
          ensureSpace(h + 7);
          for (let col = 0; col < cols; col++) {
            const item = info[i + col];
            if (!item) continue;
            drawInfoBox(item[0], item[1], margin + col * (w + gap), y + h, w, h);
          }
          y -= h + 6;
        }
      }

      const columns = [
        ["DATA", 55],
        ["CATEGORIA", 76],
        ["DESCRIÇÃO", 113],
        ["OBSERVAÇÃO", 92],
        ["VALOR", 62],
        ["PGTO", 62],
        ["SALDO", 63]
      ];

      function drawTableHeader() {
        rect(margin, y, contentWidth, 22, headerFill, headerFill);
        let x = margin;
        columns.forEach(([label, width]) => {
          drawCenterText(label, x + width / 2, y - 14, 7.2, "F2", [1, 1, 1]);
          x += width;
        });
        y -= 22;
      }

      function drawDetailRows() {
        ensureSpace(54);
        drawCenterText("DETALHAMENTO DO MÊS", pageWidth / 2, y, 10.5, "F2", ink);
        y -= 14;
        drawTableHeader();
        rows.forEach((row) => {
          const descLines = wrapForWidth(row.description || "-", columns[2][1] - 8, 7.8).slice(0, 2);
          const obsLines = wrapForWidth(row.observation || "-", columns[3][1] - 8, 7.8).slice(0, 2);
          const rowHeight = Math.max(25, 14 + Math.max(descLines.length, obsLines.length) * 9);
          ensureSpace(rowHeight + 38, true);
          let x = margin;
          columns.forEach(([, width]) => {
            rect(x, y, width, rowHeight, null, line);
            x += width;
          });
          x = margin;
          drawWrapped(formatDate(row.date), x + 4, y - 11, columns[0][1] - 8, 7.8, 9, "F1", ink, 2);
          x += columns[0][1];
          drawWrapped(row.category || "-", x + 4, y - 11, columns[1][1] - 8, 7.8, 9, "F1", ink, 2);
          x += columns[1][1];
          drawWrapped(row.description || "-", x + 4, y - 11, columns[2][1] - 8, 7.8, 9, "F1", ink, 2);
          x += columns[2][1];
          drawWrapped(row.observation || "-", x + 4, y - 11, columns[3][1] - 8, 7.8, 9, "F1", ink, 2);
          x += columns[3][1];
          drawRightText(moneyPdf(toNumber(row.value)), x + columns[4][1] - 4, y - 13, 7.8, "F1", ink);
          x += columns[4][1];
          drawRightText(moneyPdf(toNumber(row.payment)), x + columns[5][1] - 4, y - 13, 7.8, "F1", ink);
          x += columns[5][1];
          drawRightText(moneyPdf(rowBalance(row)), x + columns[6][1] - 4, y - 13, 7.8, "F2", ink);
          y -= rowHeight;
        });

        ensureSpace(42);
        rect(margin + contentWidth - 210, y, 210, 30, [1.00, 0.94, 0.84], line);
        drawText("TOTAL A DEPOSITAR", margin + contentWidth - 203, y - 19, 8, "F2", muted);
        drawRightText(moneyPdf(total), margin + contentWidth - 7, y - 19, 12, "F2", ink);
        y -= 42;
      }

      function drawNotes() {
        ensureSpace(70);
        drawText("OBSERVAÇÕES", margin, y, 9, "F2", ink);
        y -= 12;
        const noteText = statement.notes || "Após realizar a transação de depósito/transferência, solicitamos que envie o comprovante no grupo de WhatsApp de sua locação.";
        wrapForWidth(noteText, contentWidth, 8.2).slice(0, 6).forEach((lineText) => {
          drawText(lineText, margin, y, 8.2, "F1", ink);
          y -= 10;
        });
      }

      startPage();
      drawMainHeader();
      drawSnapshotGrid();
      drawDetailRows();
      drawNotes();
      finishPage();

      const objects = [];
      objects.push("<< /Type /Catalog /Pages 2 0 R >>");
      const kids = pages.map((_, index) => `${5 + index * 2} 0 R`).join(" ");
      objects.push(`<< /Type /Pages /Kids [${kids}] /Count ${pages.length} >>`);
      objects.push("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>");
      objects.push("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>");
      pages.forEach((stream, index) => {
        const pageObj = 5 + index * 2;
        const contentObj = pageObj + 1;
        objects.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /Font << /F1 3 0 R /F2 4 0 R >> >> /Contents ${contentObj} 0 R >>`);
        objects.push(`<< /Length ${stream.length} >>\nstream\n${stream}\nendstream`);
      });

      let pdf = "%PDF-1.4\n";
      const offsets = [0];
      objects.forEach((object, index) => {
        offsets.push(pdf.length);
        pdf += `${index + 1} 0 obj\n${object}\nendobj\n`;
      });
      const xref = pdf.length;
      pdf += `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
      offsets.slice(1).forEach((offset) => {
        pdf += `${String(offset).padStart(10, "0")} 00000 n \n`;
      });
      pdf += `trailer\n<< /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
      return new Blob([pdf], { type: "application/pdf" });
    }

    function bindRowActions() {
      view.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.id;
          const action = button.dataset.action;
          if (action === "edit-property") {
            editing.propertyId = id;
            window.scrollTo({ top: 0, behavior: "smooth" });
            renderProperties();
          }
          if (action === "delete-property") deleteProperty(id);
          if (action === "edit-tenant") {
            editing.tenantId = id;
            window.scrollTo({ top: 0, behavior: "smooth" });
            renderTenants();
          }
          if (action === "delete-tenant") deleteTenant(id);
        });
      });
    }

    function deleteProperty(id) {
      const hasTenant = state.tenants.some((tenant) => tenant.propertyId === id);
      if (hasTenant) return showToast("Não exclua imóvel com vínculo locatário. Encerre ou altere o vínculo primeiro.");
      if (!confirm("Excluir este imóvel?")) return;
      state.properties = state.properties.filter((property) => property.id !== id);
      save();
      renderProperties();
      showToast("Imóvel excluído.");
    }

    function deleteTenant(id) {
      if (!confirm("Excluir este vínculo locatário?")) return;
      state.tenants = state.tenants.filter((tenant) => tenant.id !== id);
      delete state.statements[id];
      save();
      renderTenants();
      showToast("Vínculo excluído.");
    }

    function propertyPreview(property) {
      if (!property) return empty("Selecione um imóvel cadastrado.");
      return `
        <div class="kv-grid">
          ${kv("Empreendimento", property.empreendimento)}
          ${kv("Endereço", compactAddress(property))}
          ${kv(`IPTU ${CURRENT_YEAR}`, `${formatLooseMoney(property.iptuValor)} ${property.iptuStatus ? "- " + property.iptuStatus : ""}`)}
          ${kv("CBMERJ", `${money(toNumber(property.taxaCbmerj))} ${property.cbmerjStatus ? "- " + property.cbmerjStatus : ""}`)}
          ${kv("Apólice", property.apoliceSeguro)}
          ${kv("Seguradora", property.nomeSeguradora)}
          ${kv("Vigência seguro", formatDate(property.vigenciaSeguro))}
          ${kv("Valor seguro", money(toNumber(property.valorSeguro)))}
        </div>
      `;
    }

    function metric(label, value) {
      return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(String(value))}</strong></div>`;
    }

    function kv(label, value) {
      return `<div class="kv"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value || "-")}</strong></div>`;
    }

    function phoneItem(label, value) {
      return `<div class="phone-item"><strong class="phone-name">${escapeHtml(label)}:</strong><span class="phone-number">${escapeHtml(value)}</span></div>`;
    }

    function empty(message) {
      return `<div class="empty">${escapeHtml(message)}</div>`;
    }

    function statusPill(valueText = "") {
      const text = String(valueText || "").trim() || "-";
      const normalized = text.toLowerCase();
      let className = "";
      if (normalized.includes("ativo") || normalized.includes("quitado")) className = "active";
      if (normalized.includes("encerrado") || normalized.includes("inativo")) className = "closed";
      if (normalized.includes("aguardando") || normalized.includes("parcel")) className = "warn";
      if (normalized.includes("atras")) className = "bad";
      return `<span class="status ${className}">${escapeHtml(text)}</span>`;
    }

    function propertyOptions(selected) {
      return state.properties.map((property) => {
        const label = `${property.id} - ${property.empreendimento || property.endereco || ""}`;
        return `<option value="${attr(property.id)}" ${property.id === selected ? "selected" : ""}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    function options(values, selected) {
      return values.map((item) => {
        const valueText = Array.isArray(item) ? item[0] : item;
        const label = Array.isArray(item) ? item[1] : item;
        return `<option value="${attr(valueText)}" ${String(valueText) === String(selected) ? "selected" : ""}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    function withCurrent(list, current) {
      const values = [...list];
      if (current && !values.includes(current)) values.push(current);
      return values;
    }

    function value(form, key) {
      return String(form.get(key) || "").trim();
    }

    function findProperty(id) {
      return state.properties.find((property) => property.id === id);
    }

    function findTenant(id) {
      return state.tenants.find((tenant) => tenant.id === id);
    }

    function activeTenants() {
      return state.tenants
        .filter((tenant) => String(tenant.status || "").toUpperCase() === "ATIVO")
        .sort((a, b) => a.id.localeCompare(b.id));
    }

    function compactAddress(property = {}) {
      const cityUf = [property.cidade, property.uf].filter(Boolean).join("/");
      return [property.endereco, property.bairro, cityUf].filter(Boolean).join(" - ");
    }

    function rowBalance(row) {
      return toNumber(row.value) - toNumber(row.payment);
    }

    function toNumber(value) {
      if (typeof value === "number") return Number.isFinite(value) ? value : 0;
      const text = String(value ?? "").trim();
      if (!text) return 0;
      const normalized = text.includes(",") ? text.replace(/\./g, "").replace(",", ".") : text;
      const number = Number(normalized.replace(/[^\d.-]/g, ""));
      return Number.isFinite(number) ? number : 0;
    }

    function money(value) {
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(toNumber(value));
    }

    function formatLooseMoney(value) {
      const text = String(value ?? "").trim();
      if (!text) return "-";
      if (/[a-zA-Z]/.test(text)) return text;
      return money(toNumber(text));
    }

    function formatDate(value) {
      const text = String(value || "").trim();
      if (!text) return "-";
      if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
      const [year, month, day] = text.split("-");
      return `${day}/${month}/${year}`;
    }

    function formatDateTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("pt-BR", {
        dateStyle: "short",
        timeStyle: "short"
      }).format(date);
    }

    function todayIso() {
      return new Date().toISOString().slice(0, 10);
    }

    function numAttr(value) {
      if (value === "" || value === null || value === undefined) return "";
      return attr(toNumber(value));
    }

    function attr(value) {
      return escapeHtml(String(value ?? ""));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function addUnique(list, valueText) {
      const text = String(valueText || "").trim();
      if (!text) return;
      if (!list.some((item) => item.toLowerCase() === text.toLowerCase())) list.push(text);
    }

    function normalizePdfText(text) {
      return String(text ?? "")
        .normalize("NFC")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-")
        .replace(/\u00A0/g, " ")
        .replace(/[^\x09\x0A\x0D\x20-\x7E\u00A0-\u00FF]/g, "-");
    }

    function asciiSlugText(text) {
      return String(text ?? "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^\x20-\x7E]/g, "-");
    }

    function wrapText(text, maxChars) {
      if (!text) return [""];
      const words = text.split(/\s+/);
      const lines = [];
      let line = "";
      words.forEach((word) => {
        const next = line ? `${line} ${word}` : word;
        if (next.length > maxChars) {
          if (line) lines.push(line);
          line = word;
        } else {
          line = next;
        }
      });
      if (line) lines.push(line);
      return lines;
    }

    function escapePdf(text) {
      return String(text).replace(/[\r\n\t\\()^\x00-\x1F\x7F-\uFFFF]/g, (char) => {
        if (char === "\\") return "\\\\";
        if (char === "(") return "\\(";
        if (char === ")") return "\\)";
        if (char === "\n") return "\\n";
        if (char === "\r") return "\\r";
        if (char === "\t") return "\\t";
        const code = char.charCodeAt(0);
        if (code >= 160 && code <= 255) return `\\${code.toString(8).padStart(3, "0")}`;
        return "-";
      });
    }

    function pdfFileName(statement, tenant) {
      const tenantName = asciiSlugText(tenant.nome || tenant.id).replace(/[^a-zA-Z0-9]+/g, "-").replace(/^-|-$/g, "");
      return `demonstrativo-${statement.tenantId}-${statement.month}-${statement.referenceYear}-${tenantName}.pdf`.toLowerCase();
    }

    function whatsappMessage(statement, snapshot) {
      const total = (statement.rows || []).reduce((sum, row) => sum + rowBalance(row), 0);
      return [
        `Olá, ${snapshot.nome}.`,
        `Segue o demonstrativo de cobrança referente a ${statement.month}/${statement.referenceYear}.`,
        `Vencimento: ${formatDate(statement.dueDate)}.`,
        `Total a depositar: ${money(total)}.`,
        `Dados de depósito: ${state.settings.bank}, agência ${state.settings.agency}, conta ${state.settings.account}, Pix ${state.settings.pix}.`
      ].join("\n");
    }

    function firstPhoneDigits(phone) {
      const match = String(phone || "").match(/\d[\d\s().-]{8,}\d/);
      let digits = match ? match[0].replace(/\D/g, "") : "";
      if (digits.length === 10 || digits.length === 11) digits = "55" + digits;
      return digits;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function exportData() {
      saveStatementFromDom(currentStatementTenantId, false);
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      downloadBlob(blob, `backup-gestao-imoveis-${todayIso()}.json`);
      showToast("Backup exportado.");
    }

    async function importData(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!confirm("Importar este backup e substituir os dados atuais?")) return;
        state = normalizeState(parsed);
        save();
        render();
        showToast("Backup importado.");
      } catch (error) {
        showToast("Não foi possível importar o arquivo.");
      } finally {
        event.target.value = "";
      }
    }

    function bindOnlineEvents() {
      document.getElementById("cloudForm")?.addEventListener("submit", submitCloudConfig);
      document.getElementById("cloudLogin")?.addEventListener("click", cloudLoginFromForm);
      document.getElementById("cloudLogout")?.addEventListener("click", cloudLogout);
      document.getElementById("cloudPush")?.addEventListener("click", () => pushCloudState({ notify: true }));
      document.getElementById("cloudPull")?.addEventListener("click", pullCloudState);
      document.getElementById("cloudTest")?.addEventListener("click", testCloudConnection);
    }

    function submitCloudConfig(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      cloudConfig = {
        ...cloudConfig,
        url: cleanCloudUrl(value(form, "url")),
        anonKey: value(form, "anonKey"),
        email: value(form, "email")
      };
      saveCloudConfig();
      renderOnline();
      showToast("Conexão online salva.");
    }

    async function cloudLoginFromForm() {
      const formEl = document.getElementById("cloudForm");
      const form = new FormData(formEl);
      cloudConfig = {
        ...cloudConfig,
        url: cleanCloudUrl(value(form, "url")),
        anonKey: value(form, "anonKey"),
        email: value(form, "email")
      };
      const password = value(form, "password");
      if (!cloudConfig.url || !cloudConfig.anonKey || !cloudConfig.email || !password) {
        return showToast("Informe URL, chave anon, e-mail e senha.");
      }
      try {
        const result = await cloudFetch("/auth/v1/token?grant_type=password", {
          method: "POST",
          auth: false,
          body: { email: cloudConfig.email, password }
        });
        cloudConfig.accessToken = result.access_token;
        cloudConfig.refreshToken = result.refresh_token;
        cloudConfig.expiresAt = Date.now() + Math.max(30, Number(result.expires_in || 3600) - 60) * 1000;
        cloudConfig.userId = result.user?.id || "";
        saveCloudConfig();
        const loaded = await pullCloudState({ silent: true });
        activeTab = loaded ? "properties" : "online";
        render();
        showToast(loaded ? "Login realizado. Dados carregados da nuvem." : "Login realizado. Nenhum dado salvo na nuvem ainda.");
      } catch (error) {
        showToast(`Não foi possível entrar: ${error.message}`);
      }
    }

    async function cloudLogout() {
      try {
        if (isCloudLoggedIn()) await cloudFetch("/auth/v1/logout", { method: "POST" });
      } catch {}
      cloudConfig = {
        url: cloudConfig.url,
        anonKey: cloudConfig.anonKey,
        email: cloudConfig.email
      };
      saveCloudConfig();
      renderOnline();
      showToast("Sessão online encerrada.");
    }

    async function testCloudConnection() {
      try {
        await ensureCloudSession();
        await cloudFetch("/rest/v1/locacao_app_state?select=updated_at&limit=1");
        showToast("Conexão com a nuvem funcionando.");
      } catch (error) {
        showToast(`Falha na conexão: ${error.message}`);
      }
    }

    async function pullCloudState(options = {}) {
      try {
        await ensureCloudSession();
        const rows = await cloudFetch(`/rest/v1/locacao_app_state?user_id=eq.${encodeURIComponent(cloudConfig.userId)}&select=payload,updated_at&limit=1`);
        const payload = rows?.[0]?.payload;
        if (!payload) {
          if (!options.silent) showToast("Nenhum dado encontrado na nuvem.");
          return false;
        }
        suppressCloudSync = true;
        state = normalizeState(payload);
        save();
        suppressCloudSync = false;
        if (!options.silent) {
          render();
          showToast("Dados baixados da nuvem.");
        }
        return true;
      } catch (error) {
        suppressCloudSync = false;
        if (!options.silent) showToast(`Não foi possível baixar: ${error.message}`);
        return false;
      }
    }

    async function pushCloudState(options = {}) {
      if (!isCloudLoggedIn()) return;
      try {
        await ensureCloudSession();
        await cloudFetch("/rest/v1/locacao_app_state?on_conflict=user_id", {
          method: "POST",
          headers: { Prefer: "resolution=merge-duplicates,return=minimal" },
          body: {
            user_id: cloudConfig.userId,
            payload: state,
            updated_at: new Date().toISOString()
          }
        });
        if (options.notify) showToast("Dados enviados para a nuvem.");
      } catch (error) {
        if (options.notify) showToast(`Não foi possível enviar: ${error.message}`);
      }
    }

    function scheduleCloudSync() {
      if (suppressCloudSync || !isCloudLoggedIn()) return;
      clearTimeout(cloudSyncTimer);
      cloudSyncTimer = setTimeout(() => pushCloudState(), 1400);
    }

    async function ensureCloudSession() {
      if (!cloudConfig.url || !cloudConfig.anonKey) throw new Error("configure URL e chave anon");
      if (!cloudConfig.accessToken || !cloudConfig.refreshToken) throw new Error("faça login primeiro");
      if (Date.now() < Number(cloudConfig.expiresAt || 0)) return;
      const result = await cloudFetch("/auth/v1/token?grant_type=refresh_token", {
        method: "POST",
        auth: false,
        body: { refresh_token: cloudConfig.refreshToken }
      });
      cloudConfig.accessToken = result.access_token;
      cloudConfig.refreshToken = result.refresh_token;
      cloudConfig.expiresAt = Date.now() + Math.max(30, Number(result.expires_in || 3600) - 60) * 1000;
      cloudConfig.userId = result.user?.id || cloudConfig.userId || "";
      saveCloudConfig();
    }

    async function cloudFetch(path, options = {}) {
      const url = `${cleanCloudUrl(cloudConfig.url)}${path}`;
      const headers = {
        apikey: cloudConfig.anonKey,
        "Content-Type": "application/json",
        ...(options.auth === false ? { Authorization: `Bearer ${cloudConfig.anonKey}` } : { Authorization: `Bearer ${cloudConfig.accessToken}` }),
        ...(options.headers || {})
      };
      const response = await fetch(url, {
        method: options.method || "GET",
        headers,
        body: options.body ? JSON.stringify(options.body) : undefined
      });
      const text = await response.text();
      let data = null;
      if (text) {
        try { data = JSON.parse(text); }
        catch { data = text; }
      }
      if (!response.ok) {
        throw new Error(data?.message || data?.error_description || data?.hint || response.statusText || "erro online");
      }
      return data;
    }

    function cleanCloudUrl(url) {
      return String(url || "").trim().replace(/\/+$/, "");
    }

    function isCloudLoggedIn() {
      return Boolean(cloudConfig.url && cloudConfig.anonKey && cloudConfig.accessToken && cloudConfig.refreshToken && cloudConfig.userId);
    }

    function loadCloudConfig() {
      try {
        return JSON.parse(localStorage.getItem(CLOUD_CONFIG_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveCloudConfig() {
      localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(cloudConfig));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return clone(defaultState);
        return normalizeState(JSON.parse(raw));
      } catch {
        return clone(defaultState);
      }
    }

    function normalizeState(data) {
      const fallback = clone(defaultState);
      const settings = { ...fallback.settings, ...(data.settings || {}) };
      if (!settings.company || settings.company === "A&F Locação") {
        settings.company = "O Ponto da Locação";
      }
      if (!settings.slogan || settings.slogan === "A certeza de um lugar seguro!") {
        settings.slogan = "Toda mudança merece um bom começo";
      }
      return {
        version: APP_VERSION,
        settings,
        categories: unique([...(fallback.categories || []), ...arrayOrEmpty(data.categories)]),
        descriptions: unique([...(fallback.descriptions || []), ...arrayOrEmpty(data.descriptions)]),
        properties: Array.isArray(data.properties) ? data.properties : fallback.properties,
        tenants: Array.isArray(data.tenants) ? data.tenants : fallback.tenants,
        statements: data.statements && typeof data.statements === "object" ? data.statements : fallback.statements
      };
    }

    function arrayOrEmpty(value) {
      return Array.isArray(value) ? value : [];
    }

    function unique(values) {
      const seen = new Set();
      return values.filter((item) => {
        const key = String(item || "").toLowerCase();
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      scheduleCloudSync();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2600);
    }
  </script>
</body>
</html>
