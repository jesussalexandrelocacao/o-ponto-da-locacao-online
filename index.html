<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>O Ponto da Locação</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #17202a;
      --muted: #667085;
      --line: #d7dde6;
      --ink: #102033;
      --brand: #0f766e;
      --brand-dark: #0a4f4a;
      --blue: #24577a;
      --gold: #b96f18;
      --danger: #b42318;
      --success: #13804e;
      --shadow: 0 14px 34px rgba(16, 32, 51, .08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select, textarea { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
    }

    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
    }

    textarea {
      resize: vertical;
      min-height: 84px;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(244, 246, 248, .96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 22px 12px;
      display: grid;
      gap: 14px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #071017;
      flex: 0 0 auto;
    }

    .brand-logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar, .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .tab-button {
      min-height: 44px;
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      box-shadow: 0 4px 14px rgba(16, 32, 51, .04);
      text-align: center;
    }

    .tab-button.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .btn {
      min-height: 38px;
      border-radius: 7px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: #e7edf3;
      color: #163047;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn.primary { background: var(--brand); color: #fff; }
    .btn.dark { background: var(--ink); color: #fff; }
    .btn.blue { background: var(--blue); color: #fff; }
    .btn.gold { background: var(--gold); color: #fff; }
    .btn.danger { background: var(--danger); color: #fff; }
    .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
    .btn.small { min-height: 30px; padding: 6px 8px; font-size: 12px; }

    .content {
      max-width: 1440px;
      margin: 0 auto;
      padding: 22px;
    }

    .view-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .view-title h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .view-title p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .wide { grid-column: span 2; }
    .full { grid-column: 1 / -1; }

    .panel, .statement-paper {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel { padding: 16px; }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-title h3 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #eef2f6;
      color: #405064;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    tr:last-child td { border-bottom: 0; }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 800;
      background: #edf2f7;
      color: #344054;
      white-space: nowrap;
    }

    .status.active, .status.ok { background: #ddf7ec; color: #087443; }
    .status.closed { background: #eceff3; color: #475467; }
    .status.warn { background: #fff1d6; color: #8a4b08; }
    .status.bad { background: #ffe4e0; color: #9a2218; }

    .empty {
      border: 1px dashed #b8c2d0;
      border-radius: 8px;
      background: #fbfcfe;
      color: var(--muted);
      padding: 18px;
      text-align: center;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 86px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 22px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .preview-box {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .kv-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    .kv {
      min-height: 54px;
      border: 1px solid #e1e6ee;
      border-radius: 7px;
      background: #fff;
      padding: 8px 10px;
    }

    .kv span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .kv strong {
      font-size: 13px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .statement-info-grid {
      display: grid;
      grid-template-columns: minmax(300px, .9fr) minmax(330px, 1fr) minmax(470px, 1.3fr);
      gap: 16px;
      align-items: start;
      margin: 14px 0 18px;
    }

    .statement-info-col {
      display: grid;
      gap: 4px;
      min-width: 0;
      --label-width: 118px;
    }

    .statement-info-col.info-col-left {
      --label-width: 142px;
    }

    .statement-info-col.info-col-middle {
      --label-width: 92px;
    }

    .statement-info-col.info-col-right {
      --label-width: 146px;
    }

    .statement-info-row {
      display: grid;
      grid-template-columns: var(--label-width) minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      min-height: 24px;
      color: #000;
    }

    .statement-info-row .info-label {
      color: #8c9298;
      font-weight: 900;
      text-align: right;
      min-width: 0;
      line-height: 1.05;
      overflow: hidden;
    }

    .statement-info-row .info-value {
      min-width: 0;
      color: #000;
      font-size: 15px;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .statement-info-row .info-control {
      width: 100%;
      min-height: 24px;
      padding: 1px 6px;
      border-color: #d0d5dd;
      border-radius: 0;
      background: #fff;
      color: #000;
      font-size: 15px;
      font-weight: 700;
    }

    .statement-info-row .info-control.select-tenant {
      font-size: 13px;
    }

    .statement-info-row.strong .info-value,
    .statement-info-row.strong .info-control {
      font-size: 16px;
      font-weight: 900;
    }

    .statement-info-row.split {
      grid-template-columns: var(--label-width) minmax(54px, .9fr) 72px minmax(76px, .8fr);
    }

    .statement-info-row.split .info-label:nth-of-type(2) {
      text-align: right;
    }

    .statement-info-spacer {
      min-height: 24px;
    }

    .status-box {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      width: 100%;
      border: 1px solid #d0d5dd;
      background: #fff;
      padding: 1px 22px 1px 7px;
      position: relative;
      font-size: 13px;
    }

    .status-box::after {
      content: "";
      position: absolute;
      right: 7px;
      top: 50%;
      margin-top: -2px;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #8c9298;
    }

    .statement-paper {
      padding: 24px;
      width: 100%;
      max-width: 1360px;
      margin: 0 auto;
    }

    .deposit-header {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 18px;
      align-items: start;
      margin-bottom: 20px;
    }

    .company-title {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .statement-logo {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      object-fit: cover;
      flex: 0 0 auto;
      background: #071017;
    }

    .company-title-text {
      min-width: 0;
    }

    .company-title h3 {
      margin: 0;
      font-size: 19px;
    }

    .company-title p {
      margin: 3px 0 0;
      color: var(--muted);
    }

    .deposit-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #f8fafc;
      display: grid;
      gap: 4px;
      font-size: 13px;
    }

    .statement-heading {
      text-align: center;
      border-top: 2px solid var(--ink);
      border-bottom: 2px solid var(--ink);
      padding: 10px;
      margin: 14px 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .statement-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-label {
      text-align: center;
      font-weight: 900;
      background: var(--ink);
      color: #fff;
      border-radius: 6px;
      padding: 9px;
      margin: 18px 0 10px;
    }

    .detail-table table {
      width: 100%;
      min-width: 0;
      table-layout: fixed;
    }

    .detail-table th,
    .detail-table td {
      padding: 6px 5px;
      min-width: 0;
    }

    .detail-table th {
      text-align: center;
      white-space: normal;
      font-size: 10px;
      line-height: 1.15;
    }

    .detail-table input,
    .detail-table select {
      width: 100%;
      min-width: 0;
      min-height: 32px;
      padding: 4px 5px;
      border-radius: 5px;
      font-size: 11px;
    }

    .detail-table input[type="date"] {
      padding-left: 4px;
      padding-right: 2px;
      font-size: 10px;
    }

    .detail-table .date-cell { width: 12%; }
    .detail-table .category-cell { width: 13%; }
    .detail-table .description-cell { width: 18%; }
    .detail-table .observation-cell { width: 18%; }
    .detail-table .value-cell { width: 10%; }
    .detail-table .payment-cell { width: 11%; }
    .detail-table .balance-cell { width: 10%; }
    .detail-table .action-cell { width: 8%; min-width: 0; }

    .detail-table .money-cell {
      text-align: right;
    }

    .detail-table [data-row-balance] {
      display: block;
      font-size: 11px;
      white-space: nowrap;
    }

    .detail-table .action-cell .btn {
      width: 30px;
      min-height: 30px;
      padding: 0;
      justify-content: center;
    }

    .total-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 132px;
      align-items: center;
      gap: 18px;
      border-top: 2px solid var(--ink);
      margin-top: 10px;
      padding-top: 12px;
      font-size: 18px;
      font-weight: 900;
    }

    .total-row span:last-child {
      text-align: right;
    }

    .note-box {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fffdf8;
      color: #3b3328;
      font-size: 13px;
      line-height: 1.45;
    }

    .note-box .attention-title {
      display: block;
      margin-top: 12px;
      text-align: center;
      color: #000;
    }

    .note-box .proof-notice {
      margin-top: 12px;
      color: #d40000;
      font-style: italic;
      text-align: center;
    }

    .phones-title {
      margin-top: 16px;
      text-align: center;
      font-size: 17px;
      font-weight: 900;
      color: #000;
    }

    .important-phones {
      display: grid;
      grid-template-columns: repeat(2, minmax(250px, 310px));
      justify-content: center;
      column-gap: 56px;
      row-gap: 5px;
      margin-top: 8px;
      font-size: 13px;
    }

    .phone-item {
      display: grid;
      grid-template-columns: minmax(126px, 1fr) minmax(104px, auto);
      align-items: center;
      gap: 12px;
      padding: 2px 0;
      background: transparent;
      border: 0;
      color: #000;
      font-weight: 900;
      min-width: 0;
    }

    .phone-name {
      text-align: right;
      min-width: 0;
      white-space: nowrap;
    }

    .phone-number {
      min-width: 104px;
      text-align: left;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      display: none;
      max-width: min(420px, calc(100vw - 36px));
      background: var(--ink);
      color: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .toast.show { display: block; }
    .hidden { display: none !important; }
    .right { text-align: right; }

    @media (max-width: 1100px) {
      .form-grid, .kv-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .summary-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .deposit-header { grid-template-columns: 1fr; }
      .statement-controls { grid-template-columns: 1fr; }
    }

    @media (max-width: 1240px) {
      .statement-info-grid {
        grid-template-columns: repeat(2, minmax(300px, 1fr));
      }

      .statement-info-col.info-col-right {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .brand-row, .view-title {
        flex-direction: column;
        align-items: stretch;
      }

      .tabs { grid-template-columns: 1fr; }
      .content, .header-inner { padding-left: 14px; padding-right: 14px; }
      .form-grid, .grid.two, .grid.three, .grid.four, .kv-grid, .summary-strip, .important-phones {
        grid-template-columns: 1fr;
      }
      .statement-info-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .statement-info-row {
        grid-template-columns: 124px minmax(0, 1fr);
      }
      .statement-info-row.split {
        grid-template-columns: 124px minmax(0, 1fr);
      }
      .statement-info-row.split .info-label:nth-of-type(2) {
        grid-column: 1;
      }
      .total-row {
        grid-template-columns: 1fr;
        text-align: right;
      }

      .wide { grid-column: auto; }
      .statement-paper { padding: 14px; }
    }

    @page {
      size: A4;
      margin: 11mm;
    }

    @media print {
      body { background: #fff; }
      .app-header, .view-title, .no-print, .toast { display: none !important; }
      .content { padding: 0; max-width: none; }
      .statement-paper {
        border: 0;
        box-shadow: none;
        max-width: none;
        padding: 0;
      }
      .statement-paper input,
      .statement-paper select,
      .statement-paper textarea {
        border: 0;
        padding: 0;
        min-height: auto;
        background: transparent;
        appearance: none;
        color: #000;
      }
      .statement-paper textarea { min-height: 34px; }
      .detail-table .action-cell { display: none; }
      .btn { display: none !important; }
      .panel { box-shadow: none; }
      th {
        background: #ececec !important;
        color: #000 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .section-label, .statement-heading {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }

    /* Product polish: compact operational layout inspired by mature property-management systems. */
    :root {
      --bg: #eef2f5;
      --surface-soft: #f7f9fb;
      --muted: #5d6877;
      --line: #d4dbe4;
      --ink: #162434;
      --brand: #0b6f68;
      --brand-dark: #07524d;
      --blue: #255f85;
      --gold: #a86617;
      --shadow: 0 10px 24px rgba(22, 36, 52, .07);
    }

    input, select, textarea {
      min-height: 34px;
      padding: 6px 8px;
      font-size: 13px;
      line-height: 1.25;
    }

    textarea { min-height: 70px; }

    label {
      gap: 4px;
      font-size: 11px;
    }

    .header-inner,
    .content {
      max-width: 1320px;
    }

    .header-inner {
      padding: 12px 18px 10px;
      gap: 10px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
    }

    .brand h1 { font-size: 19px; }
    .brand p { font-size: 12px; }

    .tab-button {
      min-height: 38px;
      padding: 8px 10px;
      font-size: 13px;
    }

    .btn {
      min-height: 34px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .content { padding: 16px 18px 22px; }

    .view-title {
      margin-bottom: 10px;
    }

    .view-title h2 { font-size: 22px; }

    .view-title p {
      margin-top: 3px;
      font-size: 13px;
    }

    .grid { gap: 10px; }

    .form-grid {
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
    }

    .record-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .form-section {
      border: 1px solid #e2e7ee;
      border-radius: 8px;
      background: #fbfcfe;
      padding: 10px;
    }

    .form-section h4 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 13px;
      letter-spacing: 0;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
      gap: 8px;
      align-items: end;
    }

    .panel { padding: 12px; }

    .panel-title {
      margin-bottom: 9px;
    }

    .panel-title h3 { font-size: 16px; }
    .muted { font-size: 12px; }

    table {
      min-width: 0;
      table-layout: fixed;
    }

    th, td {
      padding: 7px 8px;
      font-size: 12.5px;
      overflow-wrap: anywhere;
    }

    th { font-size: 10.5px; }

    .summary-strip {
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric {
      padding: 10px 12px;
      min-height: 70px;
    }

    .metric span { font-size: 10.5px; }
    .metric strong { font-size: 19px; }

    .preview-box { padding: 10px; }

    .kv-grid {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 7px;
    }

    .kv {
      min-height: 47px;
      padding: 7px 8px;
    }

    .kv span { font-size: 10px; }
    .kv strong { font-size: 12px; }

    .statement-paper {
      max-width: 1360px;
      padding: 18px;
    }

    .deposit-header {
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 12px;
      margin-bottom: 12px;
    }

    .company-title h3 { font-size: 18px; }

    .deposit-box {
      padding: 9px 10px;
      font-size: 12px;
    }

    .statement-heading {
      padding: 8px;
      margin: 10px 0;
      font-size: 16px;
    }

    .statement-controls {
      gap: 8px;
      margin-bottom: 9px;
    }

    .statement-info-grid {
      grid-template-columns: minmax(300px, .9fr) minmax(330px, 1fr) minmax(470px, 1.3fr);
      gap: 14px;
      margin-top: 12px;
    }

    .statement-info-row {
      gap: 6px;
      min-height: 22px;
    }

    .statement-info-row .info-value,
    .statement-info-row .info-control {
      font-size: 13.5px;
    }

    .statement-info-row.strong .info-value,
    .statement-info-row.strong .info-control {
      font-size: 15px;
    }

    .section-label {
      padding: 8px;
      margin: 14px 0 8px;
      font-size: 13px;
    }

    .detail-table table {
      min-width: 0;
      table-layout: fixed;
    }

    .detail-table input,
    .detail-table select {
      min-width: 0;
      width: 100%;
      padding: 5px 6px;
      font-size: 12px;
    }

    .detail-table .date-cell { width: 12%; }
    .detail-table .category-cell { width: 13%; }
    .detail-table .description-cell { width: 18%; }
    .detail-table .observation-cell { width: 18%; }
    .detail-table .value-cell { width: 10%; }
    .detail-table .payment-cell { width: 11%; }
    .detail-table .balance-cell { width: 10%; }
    .detail-table .action-cell { width: 7%; min-width: 0; }

    .detail-table input.date-cell,
    .detail-table input.money-cell {
      width: 100%;
      min-width: 0;
    }

    .total-row {
      margin-top: 8px;
      padding-top: 10px;
      font-size: 16px;
    }

    .note-box {
      margin-top: 14px;
      padding: 10px;
      font-size: 12px;
    }

    .important-phones {
      grid-template-columns: repeat(2, minmax(250px, 310px));
      column-gap: 52px;
      row-gap: 4px;
      margin-top: 10px;
      font-size: 12px;
    }

    .phone-item { padding: 2px 0; }

    @media (max-width: 1100px) {
      .section-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detail-table table { min-width: 0; }
    }

    @media (max-width: 1240px) {
      .statement-info-grid {
        grid-template-columns: repeat(2, minmax(300px, 1fr));
      }

      .statement-info-col.info-col-right {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 720px) {
      .content, .header-inner { padding-left: 12px; padding-right: 12px; }
      .section-grid { grid-template-columns: 1fr; }
      .statement-info-grid { grid-template-columns: 1fr; }
      .statement-info-col.info-col-right { grid-column: auto; }
      .detail-table table { min-width: 0; }
      .detail-table th,
      .detail-table input,
      .detail-table select,
      .detail-table [data-row-balance] {
        font-size: 9px;
      }
      .detail-table th,
      .detail-table td {
        padding-left: 3px;
        padding-right: 3px;
      }
      .toolbar .btn, .btn-row .btn { flex: 1 1 auto; }
    }

    @media print {
      .kv-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .detail-table table {
        min-width: 0;
        table-layout: fixed;
      }
      .detail-table input,
      .detail-table select {
        font-size: 9px;
      }
    }

    /* Identidade visual: paleta inspirada no logo O Ponto. */
    :root {
      --bg: #071017;
      --surface: #fff8e6;
      --surface-soft: #f5ebcf;
      --text: #10283a;
      --muted: #5d604f;
      --line: #d6caa9;
      --ink: #112f45;
      --brand: #e85a1d;
      --brand-dark: #b94116;
      --blue: #19394f;
      --gold: #efe2b8;
      --danger: #a7331a;
      --success: #17654f;
      --shadow: 0 16px 32px rgba(3, 8, 12, .16);
    }

    body {
      background:
        radial-gradient(circle at 50% -140px, rgba(239, 226, 184, .26), transparent 36%),
        linear-gradient(135deg, #071017 0%, #122e43 42%, #071017 100%);
    }

    .app-header {
      background: rgba(7, 16, 23, .96);
      border-bottom-color: rgba(239, 226, 184, .22);
      box-shadow: 0 10px 26px rgba(0, 0, 0, .24);
    }

    .brand-mark {
      position: relative;
      background: var(--brand);
      color: #fff8e6;
      box-shadow: inset 0 -8px 16px rgba(0, 0, 0, .18);
    }

    .brand h1,
    .brand p {
      color: #fff8e6;
    }

    .brand p { opacity: .78; }

    .tab-button {
      background: rgba(255, 248, 230, .08);
      color: #fff8e6;
      border-color: rgba(239, 226, 184, .26);
      box-shadow: none;
    }

    .tab-button:hover {
      background: rgba(232, 90, 29, .18);
      border-color: rgba(232, 90, 29, .7);
    }

    .tab-button.active {
      background: var(--brand);
      color: #fff8e6;
      border-color: var(--brand);
    }

    .view-title h2 { color: #fff8e6; }

    .view-title p {
      color: rgba(255, 248, 230, .72);
    }

    .panel,
    .statement-paper,
    .metric,
    .kv,
    .deposit-box,
    .phone-item,
    .table-wrap {
      background: var(--surface);
      border-color: var(--line);
    }

    .form-section,
    .preview-box {
      background: #fbf1d4;
      border-color: #dfcfaa;
    }

    input,
    select,
    textarea {
      background: #fffdf5;
      border-color: #d7c7a6;
      color: var(--text);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid rgba(232, 90, 29, .35);
      border-color: var(--brand);
    }

    th,
    .section-label,
    .statement-heading {
      background: var(--ink);
      color: #fff8e6;
    }

    th {
      border-color: #244155;
    }

    .statement-heading {
      border-color: var(--ink);
    }

    .btn.primary,
    .btn.gold {
      background: var(--brand);
      color: #fff8e6;
    }

    .btn.dark,
    .btn.blue {
      background: var(--ink);
      color: #fff8e6;
    }

    .btn.ghost {
      color: var(--ink);
      background: rgba(255, 248, 230, .64);
      border-color: #d7c7a6;
    }

    .app-header .btn.ghost {
      color: #fff8e6;
      background: rgba(255, 248, 230, .08);
      border-color: rgba(239, 226, 184, .25);
    }

    .status.active,
    .status.ok {
      background: #dbeee4;
      color: #11533d;
    }

    .status.warn {
      background: #ffe1c9;
      color: #9b3d13;
    }

    .toast {
      background: var(--ink);
      color: #fff8e6;
      border: 1px solid rgba(239, 226, 184, .24);
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-mark"><img class="brand-logo" src="assets/logo-o-ponto-da-locacao.jpg" alt="O Ponto da Locação"></div>
          <div>
            <h1>O Ponto da Locação</h1>
            <p>Gestão de imóveis, vínculos e demonstrativos.</p>
          </div>
        </div>
        <div class="toolbar">
          <button class="btn ghost" id="exportData" type="button">Exportar dados</button>
          <label class="btn ghost">
            Importar dados
            <input class="hidden" id="importData" type="file" accept="application/json,.json">
          </label>
        </div>
      </div>
      <nav class="tabs" id="tabs"></nav>
    </div>
  </header>

  <main class="content">
    <section id="view"></section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="assets/logo-data.js"></script>
  <script>
    const APP_VERSION = 2;
    const STORAGE_KEY = "af_locacao_gestao_v2";
    const CLOUD_CONFIG_KEY = "oponto_locacao_cloud_v1";
    const CURRENT_YEAR = new Date().getFullYear();
    const MONTHS = [
      "JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO",
      "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"
    ];

    const tabs = [
      ["properties", "CADASTRO DE IMÓVEIS", "Imóveis, tributos, seguro e financiamento."],
      ["tenants", "CADASTRO DE VÍNCULO LOCATÁRIO", "Locatários ativos ou encerrados vinculados aos imóveis."],
      ["statement", "DEMONSTRATIVO DE COBRANÇA", "Cobrança mensal com saldo, impressão, PDF e WhatsApp."],
      ["online", "ACESSO ONLINE", "Sincronização em nuvem com login e banco de dados."]
    ];

    const defaultState = {
      version: APP_VERSION,
      settings: {
        company: "O Ponto da Locação",
        slogan: "Toda mudança merece um bom começo",
        bank: "",
        agency: "",
        account: "",
        pix: "",
        centralSeguro24h: "3004-6268 / 0800 727 8118",
        currentTenantId: ""
      },
      categories: ["ALUGUEL", "CONDOMÍNIO", "TRIBUTOS", "MULTA CONDOMINIAL", "MULTA POR ATRASO", "SERVIÇOS", "COBRANÇA"],
      descriptions: [
        "MÊS VIGENTE",
        "BOLETO ANTERIOR",
        "COTA CONDOMINIAL",
        "ENERGIA ELÉTRICA - PARTES COMUNS",
        "ÁGUA/ESGOTO - PARTICULAR",
        "ÁGUA/ESGOTO - PARTES COMUNS",
        "SEGURO RESIDENCIAL"
      ],
      properties: [],
      tenants: [],
      statements: {}
    };

    let state = loadState();
    let cloudConfig = loadCloudConfig();
    let cloudSyncTimer = null;
    let suppressCloudSync = false;
    let activeTab = "properties";
    let editing = { propertyId: null, tenantId: null };
    let currentStatementTenantId = "";

    const view = document.getElementById("view");
    const tabsEl = document.getElementById("tabs");
    const toast = document.getElementById("toast");

    init();

    function init() {
      renderTabs();
      bindShellActions();
      render();
    }

    function bindShellActions() {
      document.getElementById("exportData").addEventListener("click", exportData);
      document.getElementById("importData").addEventListener("change", importData);
    }

    function renderTabs() {
      const visibleTabs = isCloudLoggedIn() ? tabs : tabs.filter(([id]) => id === "online");
      if (!isCloudLoggedIn() && activeTab !== "online") activeTab = "online";
      tabsEl.innerHTML = visibleTabs.map(([id, label]) => `
        <button class="tab-button ${activeTab === id ? "active" : ""}" type="button" data-tab="${id}">
          <span>${escapeHtml(label)}</span>
        </button>
      `).join("");
      tabsEl.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          if (activeTab === "statement") saveStatementFromDom(currentStatementTenantId, false);
          activeTab = button.dataset.tab;
          render();
        });
      });
    }

    function render() {
      renderTabs();
      if (!isCloudLoggedIn() && activeTab !== "online") {
        activeTab = "online";
        renderTabs();
      }
      const renderer = {
        properties: renderProperties,
        tenants: renderTenants,
        statement: renderStatement,
        online: renderOnline
      }[activeTab];
      renderer();
      document.getElementById("exportData").disabled = !isCloudLoggedIn();
      document.getElementById("importData").disabled = !isCloudLoggedIn();
    }

    function renderTitle(tabId, actionHtml = "") {
      const tab = tabs.find(([id]) => id === tabId);
      return `
        <div class="view-title">
          <div>
            <h2>${escapeHtml(tab[1])}</h2>
            <p>${escapeHtml(tab[2])}</p>
          </div>
          <div class="btn-row">${actionHtml}</div>
        </div>
      `;
    }

    function renderOnline() {
      const isLogged = isCloudLoggedIn();
      const statusText = isLogged
        ? `Conectado como ${cloudConfig.email || "usuário Supabase"}`
        : cloudConfig.url && cloudConfig.anonKey
          ? "Projeto Supabase configurado. Faça login para sincronizar."
          : "Informe os dados do projeto Supabase para ativar a nuvem.";
      view.innerHTML = `
        ${renderTitle("online")}
        <div class="summary-strip">
          ${metric("Status da nuvem", isLogged ? "Conectado" : "Pendente")}
          ${metric("Projeto", cloudConfig.url ? "Configurado" : "Não configurado")}
          ${metric("Registro", cloudConfig.userId ? "Usuário autenticado" : "Sem login")}
          ${metric("Modo local", "Sempre ativo")}
        </div>
        <div class="panel">
          <div class="panel-title">
            <h3>Conexão com Supabase</h3>
            <span class="muted">${escapeHtml(statusText)}</span>
          </div>
          <form id="cloudForm" class="form-grid">
            <label class="wide">URL do projeto Supabase
              <input name="url" placeholder="https://seu-projeto.supabase.co" value="${attr(cloudConfig.url)}">
            </label>
            <label class="wide">Chave pública anon
              <input name="anonKey" placeholder="eyJhbGciOi..." value="${attr(cloudConfig.anonKey)}">
            </label>
            <label>E-mail de acesso
              <input name="email" type="email" autocomplete="username" value="${attr(cloudConfig.email)}">
            </label>
            <label>Senha
              <input name="password" type="password" autocomplete="current-password" placeholder="Digite apenas para entrar">
            </label>
            <div class="full btn-row">
              <button class="btn primary" type="submit">Salvar conexão</button>
              <button class="btn blue" type="button" id="cloudLogin">Entrar</button>
              <button class="btn ghost" type="button" id="cloudLogout" ${isLogged ? "" : "disabled"}>Sair</button>
            </div>
          </form>
        </div>
        <div class="panel" style="margin-top:14px">
          <div class="panel-title">
            <h3>Sincronização</h3>
            <span class="muted">Use depois de criar a tabela com o arquivo SQL.</span>
          </div>
          <p class="muted">O sistema continua salvando neste computador. Quando o login estiver ativo, você pode enviar os dados atuais para a nuvem ou baixar a versão salva online.</p>
          <div class="btn-row">
            <button class="btn primary" type="button" id="cloudPush" ${isLogged ? "" : "disabled"}>Enviar dados para a nuvem</button>
            <button class="btn dark" type="button" id="cloudPull" ${isLogged ? "" : "disabled"}>Baixar dados da nuvem</button>
            <button class="btn ghost" type="button" id="cloudTest">Testar conexão</button>
          </div>
        </div>
        <div class="panel" style="margin-top:14px">
          <div class="panel-title">
            <h3>Passo obrigatório no Supabase</h3>
            <span class="muted">Executar uma vez</span>
          </div>
          <p class="muted">No painel do Supabase, abra SQL Editor e execute o arquivo <strong>supabase/schema.sql</strong>. Depois crie um usuário em Authentication ou use um usuário já cadastrado.</p>
        </div>
      `;
      bindOnlineEvents();
    }

    function renderProperties() {
      const item = state.properties.find((property) => property.id === editing.propertyId) || {};
      const activeProperties = state.properties.filter((property) => String(property.situacao || "").toLowerCase() !== "inativo").length;
      const financedTotal = state.properties.reduce((sum, property) => sum + toNumber(property.valorParcelas), 0);
      const insuranceTotal = state.properties.reduce((sum, property) => sum + toNumber(property.valorSeguro), 0);
      view.innerHTML = `
        ${renderTitle("properties", editing.propertyId ? `<button class="btn ghost" type="button" id="newProperty">Novo imóvel</button>` : "")}
        <div class="summary-strip">
          ${metric("Imóveis cadastrados", state.properties.length)}
          ${metric("Imóveis ativos", activeProperties)}
          ${metric("Parcelas financiadas", money(financedTotal))}
          ${metric("Seguros totais", money(insuranceTotal))}
        </div>
        <div class="panel">
          <div class="panel-title">
            <h3>${editing.propertyId ? "Editar imóvel" : "Novo imóvel"}</h3>
            <span class="muted">IPTU, CBMERJ e seguro alimentam o demonstrativo.</span>
          </div>
          <form id="propertyForm" class="record-form">
            ${propertyFields(item)}
            <div class="full btn-row">
              <button class="btn primary" type="submit">${editing.propertyId ? "Salvar alterações" : "Cadastrar imóvel"}</button>
              ${editing.propertyId ? `<button class="btn ghost" type="button" id="cancelPropertyEdit">Cancelar</button>` : ""}
            </div>
          </form>
        </div>
        <div class="panel" style="margin-top:14px">
          <div class="panel-title">
            <h3>Imóveis cadastrados</h3>
            <span class="muted">${state.properties.length} registros</span>
          </div>
          ${propertyTable()}
        </div>
      `;
      document.getElementById("propertyForm").addEventListener("submit", submitProperty);
      document.getElementById("newProperty")?.addEventListener("click", () => { editing.propertyId = null; renderProperties(); });
      document.getElementById("cancelPropertyEdit")?.addEventListener("click", () => { editing.propertyId = null; renderProperties(); });
      bindRowActions();
    }

    function propertyFields(item = {}) {
      return `
        <div class="form-section full">
          <h4>Identificação e endereço</h4>
          <div class="section-grid">
            <label>ID do imóvel<input name="id" required value="${attr(item.id)}" ${editing.propertyId ? "readonly" : ""}></label>
            <label>Registro prefeitura<input name="registroPrefeitura" value="${attr(item.registroPrefeitura)}"></label>
            <label>Situação
              <select name="situacao">${options(["Ativo", "Inativo", "Em manutenção"], item.situacao || "Ativo")}</select>
            </label>
            <label class="wide">Empreendimento<input name="empreendimento" value="${attr(item.empreendimento)}"></label>
            <label class="wide">Endereço<input name="endereco" value="${attr(item.endereco)}"></label>
            <label>Bairro<input name="bairro" value="${attr(item.bairro)}"></label>
            <label>Cidade<input name="cidade" value="${attr(item.cidade)}"></label>
            <label>UF<input name="uf" maxlength="2" value="${attr(item.uf || "RJ")}"></label>
          </div>
        </div>
        <div class="form-section full">
          <h4>Financiamento e obrigações anuais</h4>
          <div class="section-grid">
            <label>Banco financiador<input name="bancoFinanciador" value="${attr(item.bancoFinanciador)}"></label>
            <label>Valor das parcelas<input name="valorParcelas" type="number" min="0" step="0.01" value="${numAttr(item.valorParcelas)}"></label>
            <label>Vencimento<input name="dataVencimento" value="${attr(item.dataVencimento)}" placeholder="Dia ou data"></label>
            <label>IPTU vigente<input name="iptuValor" value="${attr(item.iptuValor)}" placeholder="Ex: 709,60 ou ISENTO"></label>
            <label>Status IPTU<input name="iptuStatus" value="${attr(item.iptuStatus)}" placeholder="Quitado, parcelado..."></label>
            <label>Código CBMERJ<input name="codigoCbmerj" value="${attr(item.codigoCbmerj)}"></label>
            <label>Taxa CBMERJ<input name="taxaCbmerj" type="number" min="0" step="0.01" value="${numAttr(item.taxaCbmerj)}"></label>
            <label>Status CBMERJ<input name="cbmerjStatus" value="${attr(item.cbmerjStatus)}"></label>
          </div>
        </div>
        <div class="form-section full">
          <h4>Seguro residencial</h4>
          <div class="section-grid">
            <label>Apólice<input name="apoliceSeguro" value="${attr(item.apoliceSeguro)}"></label>
            <label>Seguradora<input name="nomeSeguradora" value="${attr(item.nomeSeguradora)}"></label>
            <label>Telefone seguradora<input name="telefoneSeguradora" value="${attr(item.telefoneSeguradora)}"></label>
            <label>Vigência<input name="vigenciaSeguro" type="date" value="${attr(item.vigenciaSeguro)}"></label>
            <label>Valor total<input name="valorSeguro" type="number" min="0" step="0.01" value="${numAttr(item.valorSeguro)}"></label>
            <label>Parcelas<input name="parcelasSeguro" type="number" min="0" step="1" value="${numAttr(item.parcelasSeguro)}"></label>
            <label>Venc. parcela<input name="vencParcelaSeguro" value="${attr(item.vencParcelaSeguro)}"></label>
            <label>Situação seguro<input name="situacaoSeguro" value="${attr(item.situacaoSeguro)}"></label>
          </div>
        </div>
      `;
    }

    function submitProperty(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const id = String(form.get("id") || "").trim();
      if (!id) return showToast("Informe o ID do imóvel.");
      const duplicate = state.properties.some((property) => property.id === id && property.id !== editing.propertyId);
      if (duplicate) return showToast("Já existe imóvel com esse ID.");
      const property = {
        id,
        registroPrefeitura: value(form, "registroPrefeitura"),
        bancoFinanciador: value(form, "bancoFinanciador"),
        valorParcelas: toNumber(form.get("valorParcelas")),
        dataVencimento: value(form, "dataVencimento"),
        empreendimento: value(form, "empreendimento"),
        endereco: value(form, "endereco"),
        bairro: value(form, "bairro"),
        cidade: value(form, "cidade"),
        uf: value(form, "uf").toUpperCase(),
        iptuValor: value(form, "iptuValor"),
        iptuStatus: value(form, "iptuStatus"),
        codigoCbmerj: value(form, "codigoCbmerj"),
        taxaCbmerj: toNumber(form.get("taxaCbmerj")),
        cbmerjStatus: value(form, "cbmerjStatus"),
        apoliceSeguro: value(form, "apoliceSeguro"),
        nomeSeguradora: value(form, "nomeSeguradora"),
        telefoneSeguradora: value(form, "telefoneSeguradora"),
        vigenciaSeguro: value(form, "vigenciaSeguro"),
        valorSeguro: toNumber(form.get("valorSeguro")),
        parcelasSeguro: value(form, "parcelasSeguro"),
        vencParcelaSeguro: value(form, "vencParcelaSeguro"),
        situacaoSeguro: value(form, "situacaoSeguro"),
        situacao: value(form, "situacao")
      };
      const index = state.properties.findIndex((item) => item.id === editing.propertyId);
      if (index >= 0) state.properties[index] = property;
      else state.properties.push(property);
      editing.propertyId = null;
      save();
      renderProperties();
      showToast("Imóvel salvo.");
    }

    function propertyTable() {
      if (!state.properties.length) return empty("Nenhum imóvel cadastrado.");
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Empreendimento</th><th>Endereço</th><th>IPTU ${CURRENT_YEAR}</th>

    function renderTenants() {

      const selectedProperty = findProperty(item.propertyId || state.properties[0]?.id);
      const activeCount = activeTenants().length;
      const rentTotal = activeTenants().reduce((sum, tenant) => sum + toNumber(tenant.valorAluguel), 0);
      view.innerHTML = `
        ${renderTitle("tenants", editing.tenantId ? `<button class="btn ghost" type="button" id="newTenant">Novo vínculo</button>` : "")}
        <div class="summary-strip">
          ${metric("Vínculos cadastrados", state.tenants.length)}
          ${metric("Locações ativas", activeCount)}
          ${metric("Aluguel ativo mensal", money(rentTotal))}
          ${metric("Imóveis disponíveis", state.properties.length)}
        </div>
        <div class="panel">
          <div class="panel-title">
            <h3>${editing.tenantId ? "Editar vínculo" : "Novo vínculo locatário"}</h3>

          </div>
          <form id="tenantForm" class="record-form">
            ${tenantFields(item)}
            <div class="full preview-box" id="propertyPreview">
              ${propertyPreview(selectedProperty)}

              <button class="btn primary" type="submit">${editing.tenantId ? "Salvar alterações" : "Cadastrar vínculo"}</button>

            </div>
          </form>
        </div>
        <div class="panel" style="margin-top:14px">
          <div class="panel-title">
            <h3>Vínculos locatários</h3>
            <span class="muted">${activeCount} ativos</span>

          ${tenantTable()}
        </div>
      `;
      document.getElementById("tenantForm").addEventListener("submit", submitTenant);

    function tenantFields(item = {}) {
      return `
        <div class="form-section full">

          <div class="section-grid">
            <label>ID do locatário<input name="id" required value="${attr(item.id)}" ${editing.tenantId ? "readonly" : ""}></label>

                <option value="18 meses"></option>

      `;

    function submitTenant(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const id = String(form.get("id") || "").trim();
      const property = findProperty(value(form, "propertyId"));
      if (!id) return showToast("Informe o ID do locatário.");
      if (!property) return showToast("Selecione um imóvel cadastrado.");
      const duplicate = state.tenants.some((tenant) => tenant.id === id && tenant.id !== editing.tenantId);
      if (duplicate) return showToast("Já existe locatário com esse ID.");
      const tenant = {
        id,
        status: value(form, "status"),
        nome: value(form, "nome"),
        email: value(form, "email"),
        telefone: value(form, "telefone"),
        propertyId: value(form, "propertyId"),
        vigenciaContrato: value(form, "vigenciaContrato"),
        plano: value(form, "plano"),
        valorAluguel: toNumber(form.get("valorAluguel")),
        dataReajuste: value(form, "dataReajuste"),
        renovacaoSeguro: value(form, "renovacaoSeguro") || property.vigenciaSeguro || ""
      };
      const index = state.tenants.findIndex((item) => item.id === editing.tenantId);
      if (index >= 0) state.tenants[index] = tenant;
      else state.tenants.push(tenant);
      editing.tenantId = null;
      save();
      renderTenants();
      showToast("Vínculo locatário salvo.");
    }

        : active[0]?.id || "";
      state.settings.currentTenantId = tenantId;
      currentStatementTenantId = tenantId;

      const statement = getStatement(tenant);
      const snapshot = tenant ? tenantSnapshot(tenant) : null;

        ${renderTitle("statement")}

    function statementInfoGrid(tenant, snapshot, statement) {

      const tenantControl = `<select class="info-control select-tenant" name="tenantId">${activeTenants().map((item) => `<option value="${attr(item.id)}" ${item.id === tenant.id ? "selected" : ""}>${escapeHtml(item.id)} - ${escapeHtml(item.nome)}</option>`).join("")}</select>`;

        <div class="statement-info-grid">
          <div class="statement-info-col info-col-left">

            ${infoControlRow("Vencimento:", dueControl, "strong")}
            ${infoControlRow("Id. / Locatário:", tenantControl)}
            ${infoRow("Cel.:", snapshot.telefone)}
            ${infoRow("Valor do Aluguel:", money(toNumber(snapshot.valorAluguel)))}
            <div class="statement-info-spacer"></div>
            ${infoRow("Renov. Seguro:", formatDate(snapshot.renovacaoSeguro))}
            ${infoRow("Valor do Seguro:", money(toNumber(snapshot.valorSeguro)))}

          <div class="statement-info-col info-col-middle">

            <div class="statement-info-spacer"></div>

            ${infoRow("E-mail:", snapshot.email)}
            ${splitInfoRow("Plano:", snapshot.plano, "Vigência:", formatDate(snapshot.vigenciaContrato))}
            ${infoRow("Reaj.:", snapshot.dataReajuste)}
            ${infoRow("Apólice:", snapshot.apoliceSeguro)}
            ${infoRow("Status:", statusBox(snapshot.situacaoSeguro), "raw")}

            <div class="statement-info-spacer"></div>
            ${infoRow("Empreendimento:", snapshot.empreendimento)}
            ${infoRow("End.:", snapshot.endereco)}
            ${infoRow("Bairro:", snapshot.bairro)}
            ${infoRow("Cidade/UF:", cityUf)}
            ${splitInfoRow(`IPTU-${CURRENT_YEAR}:`, formatLooseMoney(snapshot.iptuValor), "Status:", statusBox(snapshot.iptuStatus), "raw-second")}

    function infoRow(label, value, mode = "") {
      const content = mode === "raw" ? value : escapeHtml(value || "-");
      return `<div class="statement-info-row"><span class="info-label">${escapeHtml(label)}</span><span class="info-value">${content}</span></div>`;
    }

    function infoControlRow(label, control, className = "") {
      return `<div class="statement-info-row ${className}"><span class="info-label">${escapeHtml(label)}</span>${control}</div>`;
    }

    function splitInfoRow(leftLabel, leftValue, rightLabel, rightValue, mode = "") {
      const left = escapeHtml(leftValue || "-");
      const right = mode === "raw-second" ? rightValue : escapeHtml(rightValue || "-");
      return `<div class="statement-info-row split"><span class="info-label">${escapeHtml(leftLabel)}</span><span class="info-value">${left}</span><span class="info-label">${escapeHtml(rightLabel)}</span><span class="info-value">${right}</span></div>`;
    }

    function statusBox(value) {
      return `<span class="status-box">${escapeHtml(value || "-")}</span>`;
    }

    function bindStatementEvents() {
      document.getElementById("settingsForm").addEventListener("submit", submitSettings);
      const form = document.getElementById("statementForm");
      form.elements.tenantId.addEventListener("change", (event) => {
        saveStatementFromDom(currentStatementTenantId, false);
        state.settings.currentTenantId = event.target.value;
        save();
        renderStatement();
      });
      form.addEventListener("input", (event) => {
        if (event.target.matches("[data-detail-field]")) updateRowTotals();
        if (event.target.name === "notes") {
          document.getElementById("printNotes").textContent = event.target.value;
        }
      });
      document.getElementById("addDetailRow").addEventListener("click", addDetailRow);
      document.getElementById("addCategory").addEventListener("click", addCategory);
      document.getElementById("addDescription").addEventListener("click", addDescription);
      document.getElementById("saveStatement").addEventListener("click", () => {
        saveStatementFromDom(currentStatementTenantId, true);
      });
      document.getElementById("printStatement").addEventListener("click", printStatementPdf);
      document.getElementById("downloadPdf").addEventListener("click", downloadStatementPdf);
      document.getElementById("sendWhatsapp").addEventListener("click", sendWhatsapp);
      document.querySelectorAll("[data-action='remove-detail']").forEach((button) => {
        button.addEventListener("click", () => removeDetailRow(Number(button.dataset.index)));
      });
    }

    function submitSettings(event) {
      event.preventDefault();
      saveStatementFromDom(currentStatementTenantId, false);
      const form = new FormData(event.currentTarget);
      state.settings = {
        ...state.settings,
        bank: value(form, "bank"),
        agency: value(form, "agency"),
        account: value(form, "account"),
        pix: value(form, "pix"),
        centralSeguro24h: value(form, "centralSeguro24h"),
        company: value(form, "company"),
        slogan: value(form, "slogan")
      };
      save();
      renderStatement();
      showToast("Dados de depósito salvos.");
    }

    function detailRow(row = {}, index) {
      return `
        <tr data-row="${index}">
          <td><input class="date-cell" data-detail-field="date" type="date" value="${attr(row.date)}"></td>
          <td><select data-detail-field="category">${options(withCurrent(state.categories, row.category), row.category || "ALUGUEL")}</select></td>
          <td><select data-detail-field="description">${options(withCurrent(state.descriptions, row.description), row.description || "MÊS VIGENTE")}</select></td>
          <td><input data-detail-field="observation" value="${attr(row.observation)}"></td>
          <td><input class="money-cell" data-detail-field="value" type="number" step="0.01" value="${numAttr(row.value)}"></td>
          <td><input class="money-cell" data-detail-field="payment" type="number" step="0.01" value="${numAttr(row.payment)}"></td>
          <td class="right"><strong data-row-balance>${money(rowBalance(row))}</strong></td>
          <td class="action-cell no-print"><button class="btn small danger" type="button" data-action="remove-detail" data-index="${index}" title="Remover linha" aria-label="Remover linha">X</button></td>
        </tr>
      `;
    }

    function saveStatementFromDom(tenantIdOverride = "", notify = false) {
      const form = document.getElementById("statementForm");
      if (!form) return null;
      const tenantId = tenantIdOverride || form.elements.tenantId.value;
      const rows = Array.from(document.querySelectorAll("#detailBody tr")).map((tr) => {
        const data = {};
        tr.querySelectorAll("[data-detail-field]").forEach((field) => {
          data[field.dataset.detailField] = field.value;
        });
        return {
          date: data.date || "",
          category: data.category || "",
          description: data.description || "",
          observation: data.observation || "",
          value: data.value === "" ? "" : toNumber(data.value),
          payment: data.payment === "" ? "" : toNumber(data.payment)
        };
      }).filter((row) => row.date || row.category || row.description || row.observation || row.value !== "" || row.payment !== "");

      rows.forEach((row) => {
        if (row.category) addUnique(state.categories, row.category);
        if (row.description) addUnique(state.descriptions, row.description);
      });

      const statement = {
        tenantId,
        month: form.elements.month.value,
        referenceYear: form.elements.referenceYear.value || String(CURRENT_YEAR),
        dueDate: form.elements.dueDate.value,
        notes: form.elements.notes?.value || "",
        rows: rows.length ? rows : [defaultDetailRow(findTenant(tenantId))],
        updatedAt: new Date().toISOString()
      };
      state.statements[tenantId] = statement;
      state.settings.currentTenantId = tenantId;
      save();
      if (notify) {
        showToast("Demonstrativo salvo para " + tenantId + ".");
        renderStatement();
      }
      return statement;
    }

    function addDetailRow() {
      const statement = saveStatementFromDom(currentStatementTenantId, false);
      if (!statement) return;
      statement.rows.push({ date: "", category: "ALUGUEL", description: "MÊS VIGENTE", observation: "", value: "", payment: "" });
      state.statements[statement.tenantId] = statement;
      save();
      renderStatement();
    }

    function removeDetailRow(index) {
      const statement = saveStatementFromDom(currentStatementTenantId, false);
      if (!statement) return;
      statement.rows.splice(index, 1);
      if (!statement.rows.length) statement.rows.push(defaultDetailRow(findTenant(statement.tenantId)));
      state.statements[statement.tenantId] = statement;
      save();
      renderStatement();
    }

      updateRowTotals();

    function downloadStatementPdf() {
      const pdf = getCurrentStatementPdf();
      if (!pdf) return;
      downloadBlob(pdf.blob, pdf.filename);
      showToast("PDF gerado.");
    }

    function printStatementPdf() {
      const pdf = getCurrentStatementPdf();
      if (!pdf) return;
      const url = URL.createObjectURL(pdf.blob);
      const printWindow = window.open(url, "_blank");
      if (!printWindow) {
        downloadBlob(pdf.blob, pdf.filename);
        URL.revokeObjectURL(url);
        showToast("PDF gerado. Abra o arquivo baixado para imprimir sem cabeçalho do navegador.");
        return;
      }
      showToast("PDF aberto para impressão sem URL, data ou título do navegador.");
      setTimeout(() => {
        try {
          printWindow.focus();
          printWindow.print();
        } catch (error) {
          showToast("PDF aberto. Use Ctrl+P nessa aba para imprimir.");
        }
      }, 900);
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }

    async function sendWhatsapp() {
      const pdf = getCurrentStatementPdf();
      if (!pdf) return;
      const file = new File([pdf.blob], pdf.filename, { type: "application/pdf" });
      const message = whatsappMessage(pdf.statement, pdf.snapshot);

      if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
        try {
          await navigator.share({ title: "Demonstrativo de cobrança", text: message, files: [file] });
          showToast("PDF formatado enviado para compartilhamento.");
          return;
        } catch (error) {
          if (error.name === "AbortError") return;
        }
      }

      downloadBlob(pdf.blob, pdf.filename);
      const phone = firstPhoneDigits(pdf.snapshot.telefone);
      const baseUrl = phone ? `https://wa.me/${phone}` : "https://wa.me/";
      const url = `${baseUrl}?text=${encodeURIComponent(message + "\n\nO PDF formatado foi baixado. Anexe o arquivo nesta conversa para manter a formatação.")}`;
      window.open(url, "_blank", "noopener");
      showToast("PDF formatado baixado; anexe no WhatsApp aberto.");
    }

    function buildReferenceStyleStatementPdf(statement, snapshot) {
      const pageWidth = 595.28;
      const pageHeight = 841.89;
      const margin = 61;
      const tableWidth = 472;
      const rows = statement.rows || [];
      const total = rows.reduce((sum, row) => sum + rowBalance(row), 0);
      const ops = [];
      const logoHex = base64ToAsciiHex((typeof window !== "undefined" && window.APP_LOGO_JPEG_BASE64) || "");
      const hasLogoImage = Boolean(logoHex);

      const navy = [0.07, 0.18, 0.27];
      const blue = [0.12, 0.22, 0.55];
      const lightBlue = [0.80, 0.88, 0.94];
      const lightGray = [0.94, 0.94, 0.94];
      const gray = [0.55, 0.55, 0.55];
      const red = [0.92, 0.00, 0.00];
      const black = [0, 0, 0];
      const yellow = [1.00, 1.00, 0.00];
      const paleRed = [0.94, 0.72, 0.70];

      function rgb(values, mode = "rg") {
        return `${values.map((value) => value.toFixed(3)).join(" ")} ${mode}`;
      }

      function rect(x, top, w, h, fill = null, stroke = null) {
        if (fill) ops.push(`${rgb(fill)} ${x.toFixed(2)} ${(top - h).toFixed(2)} ${w.toFixed(2)} ${h.toFixed(2)} re f`);
        if (stroke) ops.push(`${rgb(stroke, "RG")} ${x.toFixed(2)} ${(top - h).toFixed(2)} ${w.toFixed(2)} ${h.toFixed(2)} re S`);
      }

      function line(x1, y1, x2, y2, color = gray, width = 0.6) {
        ops.push(`${rgb(color, "RG")} ${width} w ${x1.toFixed(2)} ${y1.toFixed(2)} m ${x2.toFixed(2)} ${y2.toFixed(2)} l S`);
      }

      function textWidth(text, size) {
        return normalizePdfText(text).length * size * 0.48;
      }

      function fitText(text, width, size) {
        let fitted = normalizePdfText(text || "-");
        if (textWidth(fitted, size) <= width) return fitted;
        while (fitted.length > 4 && textWidth(`${fitted}...`, size) > width) {
          fitted = fitted.slice(0, -1);
        }
        return `${fitted}...`;
      }

      function drawText(text, x, y, size = 8, font = "F1", color = black) {
        ops.push(`BT /${font} ${size} Tf ${rgb(color)} ${x.toFixed(2)} ${y.toFixed(2)} Td (${escapePdf(normalizePdfText(text))}) Tj ET`);
      }

      function drawRightText(text, right, y, size = 8, font = "F1", color = black) {
        drawText(text, right - textWidth(text, size), y, size, font, color);
      }

      function drawCenterText(text, center, y, size = 8, font = "F1", color = black) {
        drawText(text, center - textWidth(text, size) / 2, y, size, font, color);
      }

      function wrapForWidth(text, width, size = 7) {
        const maxChars = Math.max(8, Math.floor(width / (size * 0.48)));
        return wrapText(normalizePdfText(text || ""), maxChars);
      }

      function base64ToAsciiHex(base64) {
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
        let buffer = 0;
        let bits = 0;
        let hex = "";
        String(base64 || "").replace(/\s/g, "").split("").forEach((char) => {
          if (char === "=") return;
          const value = alphabet.indexOf(char);
          if (value < 0) return;
          buffer = (buffer << 6) | value;
          bits += 6;
          if (bits >= 8) {
            bits -= 8;
            const byte = (buffer >> bits) & 255;
            hex += byte.toString(16).padStart(2, "0").toUpperCase();
          }
        });
        return hex ? `${hex}>` : "";
      }

      function drawImage(name, x, top, w, h) {
        ops.push(`q ${w.toFixed(2)} 0 0 ${h.toFixed(2)} ${x.toFixed(2)} ${(top - h).toFixed(2)} cm /${name} Do Q`);
      }

      function clipCircle(cx, cy, radius) {
        const k = radius * 0.5522847498;
        const values = [cx, cy, radius, k].map((value) => Number(value).toFixed(2));
        const [x, y, r, curve] = values;
        ops.push(`q ${(Number(x) + Number(r)).toFixed(2)} ${y} m ${(Number(x) + Number(r)).toFixed(2)} ${(Number(y) + Number(curve)).toFixed(2)} ${(Number(x) + Number(curve)).toFixed(2)} ${(Number(y) + Number(r)).toFixed(2)} ${x} ${(Number(y) + Number(r)).toFixed(2)} c ${(Number(x) - Number(curve)).toFixed(2)} ${(Number(y) + Number(r)).toFixed(2)} ${(Number(x) - Number(r)).toFixed(2)} ${(Number(y) + Number(curve)).toFixed(2)} ${(Number(x) - Number(r)).toFixed(2)} ${y} c ${(Number(x) - Number(r)).toFixed(2)} ${(Number(y) - Number(curve)).toFixed(2)} ${(Number(x) - Number(curve)).toFixed(2)} ${(Number(y) - Number(r)).toFixed(2)} ${x} ${(Number(y) - Number(r)).toFixed(2)} c ${(Number(x) + Number(curve)).toFixed(2)} ${(Number(y) - Number(r)).toFixed(2)} ${(Number(x) + Number(r)).toFixed(2)} ${(Number(y) - Number(curve)).toFixed(2)} ${(Number(x) + Number(r)).toFixed(2)} ${y} c h W n`);
      }

      function drawField(label, value, labelX, valueX, y, valueSize = 7.1, maxWidth = 128) {
